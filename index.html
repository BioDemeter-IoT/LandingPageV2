<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BioDemeter IoT | PlantSync</title>
    </head>
<body class="bg-background text-foreground antialiased font-sans">

    <header id="main-header" class="fixed w-full z-50 transition-all duration-300 border-b border-border/40 bg-background/80 backdrop-blur-md">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img src="/placeholder-logo.svg" alt="Logo" class="h-8 w-8">
                <span class="text-xl font-bold tracking-tight">PlantSync</span>
            </div>
            
            <div class="hidden md:flex gap-8 items-center">
                <a href="#hero" class="text-sm font-medium hover:text-primary transition-colors" data-i18n="navbar.home"></a>
                <a href="#iot" class="text-sm font-medium hover:text-primary transition-colors" data-i18n="navbar.features"></a>
                <a href="#pricing" class="text-sm font-medium hover:text-primary transition-colors" data-i18n="navbar.pricing"></a>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex gap-1 text-xs border rounded-md p-0.5">
                    <button data-lang-switch="es" class="px-2 py-1 rounded bg-secondary/50 font-bold">ES</button>
                    <button data-lang-switch="en" class="px-2 py-1 rounded hover:bg-secondary/50">EN</button>
                </div>
                <button class="bg-primary text-primary-foreground px-4 py-2 rounded-lg text-sm font-medium hover:opacity-90 transition-opacity">
                    <span data-i18n="navbar.access"></span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero" class="relative pt-32 pb-20 px-6 overflow-hidden">
            <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">
                <div class="space-y-6">
                    <h1 data-i18n="hero.title" class="text-5xl md:text-6xl font-extrabold leading-tight tracking-tight"></h1>
                    <p data-i18n="hero.subtitle" class="text-lg text-muted-foreground leading-relaxed"></p>
                    <div class="flex gap-4">
                        <button class="bg-primary text-primary-foreground px-8 py-4 rounded-xl font-semibold hover:scale-105 transition-transform">
                            <span data-i18n="hero.cta"></span>
                        </button>
                    </div>
                </div>
                <div class="relative">
                    <div class="w-full h-[400px] bg-gradient-organic rounded-3xl border border-border animate-float"></div>
                </div>
            </div>
        </section>

        <section id="iot" class="py-20 bg-muted/30">
            <div class="max-w-7xl mx-auto px-6 text-center">
                <h2 class="text-4xl font-bold mb-12">Telemetría IoT en Tiempo Real</h2>
                </div>
        </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
