<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BioDemeter IoT | PlantSync</title>
</head>
<body class="bg-background text-foreground antialiased font-sans">

    <header id="main-header" class="fixed w-full z-50 transition-all duration-300 border-b border-border/40 bg-background/80 backdrop-blur-md">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img src="/placeholder-logo.svg" alt="Logo" class="h-8 w-8">
                <span class="text-xl font-bold tracking-tight">PlantSync</span>
            </div>
            
            <div class="hidden md:flex gap-6 items-center">
                <a href="#hero" class="text-sm font-medium hover:text-primary" data-i18n="navbar.home"></a>
                <a href="#beneficios" class="text-sm font-medium hover:text-primary" data-i18n="navbar.benefits"></a>
                <a href="#como-funciona" class="text-sm font-medium hover:text-primary" data-i18n="navbar.how"></a>
                <a href="#iot" class="text-sm font-medium hover:text-primary" data-i18n="navbar.features"></a>
                <a href="#ai" class="text-sm font-medium hover:text-primary" data-i18n="navbar.ai"></a>
                <a href="#pricing" class="text-sm font-medium hover:text-primary" data-i18n="navbar.pricing"></a>
                <a href="#faq" class="text-sm font-medium hover:text-primary" data-i18n="navbar.faq"></a>
                <a href="#team" class="text-sm font-medium hover:text-primary" data-i18n="navbar.team"></a>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex gap-1 text-xs border rounded-md p-0.5">
                    <button data-lang-switch="es" class="px-2 py-1 rounded bg-secondary/50 font-bold">ES</button>
                    <button data-lang-switch="en" class="px-2 py-1 rounded hover:bg-secondary/50">EN</button>
                </div>
                <button class="hidden md:block bg-primary text-primary-foreground px-4 py-2 rounded-lg text-sm font-medium hover:opacity-90 transition-opacity" data-i18n="navbar.access"></button>
                <button id="mobile-menu-btn" class="md:hidden p-2">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </nav>

        <div id="mobile-menu" class="hidden md:hidden bg-background border-t p-6">
            <div class="flex flex-col gap-4">
                <a href="#hero" class="text-lg font-medium" data-i18n="navbar.home"></a>
                <a href="#beneficios" class="text-lg font-medium" data-i18n="navbar.benefits"></a>
                <a href="#iot" class="text-lg font-medium" data-i18n="navbar.features"></a>
                <a href="#ai" class="text-lg font-medium" data-i18n="navbar.ai"></a>
                <a href="#pricing" class="text-lg font-medium" data-i18n="navbar.pricing"></a>
                <a href="#faq" class="text-lg font-medium" data-i18n="navbar.faq"></a>
                <a href="#team" class="text-lg font-medium" data-i18n="navbar.team"></a>
            </div>
        </div>
    </header>

    <main>
        <section id="hero" class="relative pt-32 pb-20 px-6 overflow-hidden">
            <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">
                <div class="space-y-6">
                    <span class="inline-flex items-center rounded-full bg-secondary/50 px-3 py-1 text-sm font-medium">
                        <span class="w-2 h-2 rounded-full bg-primary mr-2"></span>
                        by BioPafi
                    </span>
                    <h1 class="text-5xl md:text-6xl font-extrabold leading-tight tracking-tight text-foreground" data-i18n="hero.title"></h1>
                    <p class="text-lg text-muted-foreground leading-relaxed" data-i18n="hero.subtitle"></p>
                    <div class="flex gap-4">
                        <button class="bg-primary text-primary-foreground px-8 py-4 rounded-xl font-semibold hover:opacity-90 transition-opacity" data-i18n="hero.cta_start"></button>
                        <button class="bg-secondary px-8 py-4 rounded-xl font-semibold hover:bg-secondary/80 transition-colors" data-i18n="hero.cta_how"></button>
                    </div>
                </div>
                <div class="relative flex justify-center">
                    <div class="w-full max-w-md h-[400px] bg-gradient-organic rounded-full border border-border animate-float"></div>
                </div>
            </div>
        </section>

        <section id="beneficios" class="py-20 bg-muted/20">
            <div class="max-w-7xl mx-auto px-6 text-center mb-16">
                <span class="bg-secondary px-4 py-1.5 rounded-full text-sm font-medium text-primary" data-i18n="benefits.badge"></span>
                <h2 class="text-4xl md:text-5xl font-bold mt-6 mb-6" data-i18n="benefits.title"></h2>
                <p class="text-muted-foreground max-w-2xl mx-auto" data-i18n="benefits.subtitle"></p>
            </div>

            <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-6">
                <div class="p-8 border border-border bg-background rounded-3xl">
                    <div class="w-12 h-12 bg-pink-100 rounded-xl flex items-center justify-center mb-6">
                        <i data-lucide="heart" class="text-pink-600"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-2" data-i18n="benefits.card1.title"></h3>
                    <p class="text-muted-foreground" data-i18n="benefits.card1.desc"></p>
                </div>
                <div class="p-8 border border-border bg-background rounded-3xl">
                    <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center mb-6">
                        <i data-lucide="clock" class="text-blue-600"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-2" data-i18n="benefits.card2.title"></h3>
                    <p class="text-muted-foreground" data-i18n="benefits.card2.desc"></p>
                </div>
            </div>
        </section>

        <section id="como-funciona" class="py-20 bg-background">
            <div class="max-w-7xl mx-auto px-6 text-center">
                <span class="bg-secondary px-4 py-1.5 rounded-full text-sm font-medium text-primary" data-i18n="how.badge"></span>
                <h2 class="text-4xl font-bold mt-6 mb-16" data-i18n="how.title"></h2>
                
                <div class="grid md:grid-cols-3 gap-8">
                    <div class="p-8 border rounded-3xl bg-muted/20">
                        <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-6 mx-auto">
                            <i data-lucide="camera" class="text-primary"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-4" data-i18n="how.step1.title"></h3>
                        <p class="text-muted-foreground" data-i18n="how.step1.desc"></p>
                    </div>
                    <div class="p-8 border rounded-3xl bg-muted/20">
                        <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-6 mx-auto">
                            <i data-lucide="wifi" class="text-primary"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-4" data-i18n="how.step2.title"></h3>
                        <p class="text-muted-foreground" data-i18n="how.step2.desc"></p>
                    </div>
                    <div class="p-8 border rounded-3xl bg-muted/20">
                        <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-6 mx-auto">
                            <i data-lucide="brain" class="text-primary"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-4" data-i18n="how.step3.title"></h3>
                        <p class="text-muted-foreground" data-i18n="how.step3.desc"></p>
                    </div>
                </div>
            </div>
        </section>

        <section id="faq" class="py-20 bg-muted/30">
            <div class="max-w-3xl mx-auto px-6">
                <h2 class="text-4xl font-bold text-center mb-12" data-i18n="faq.title"></h2>
                <div id="accordion-container" class="space-y-4">
                    <div class="accordion-item border rounded-xl p-4">
                        <button class="flex justify-between w-full font-bold">
                            <span data-i18n="faq.q1.question"></span>
                            <i data-lucide="chevron-down"></i>
                        </button>
                        <div class="hidden pt-4 text-muted-foreground" data-i18n="faq.q1.answer"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="iot" class="py-20 bg-background">
            <div class="max-w-7xl mx-auto px-6">
                <h2 class="text-4xl font-bold text-center mb-12" data-i18n="iot.title"></h2>
                <div class="grid md:grid-cols-3 gap-12 items-center">
                    <div class="space-y-6"></div>
                    <div class="flex justify-center">
                        <div class="w-64 h-64 bg-gradient-organic rounded-full shadow-2xl animate-float"></div>
                    </div>
                    <div class="space-y-6"></div>
                </div>
            </div>
        </section>

        <section id="ai" class="py-24 lg:py-32 relative">
            <div class="max-w-7xl mx-auto px-6 text-center mb-16">
                <h2 class="text-4xl font-bold" data-i18n="ai.title"></h2>
                <p class="text-muted-foreground mt-4" data-i18n="ai.subtitle"></p>
            </div>
            
            <div class="max-w-5xl mx-auto px-6 grid md:grid-cols-2 gap-8 items-center">
                <div class="grid sm:grid-cols-2 gap-4">
                    <div class="p-6 border rounded-2xl bg-card">
                        <i data-lucide="message-square" class="w-8 h-8 text-primary mb-4"></i>
                        <h4 class="font-bold" data-i18n="ai.card1"></h4>
                    </div>
                </div>
                
                <div class="bg-card p-6 rounded-2xl border shadow-lg" id="ai-chat-messages">
                </div>
            </div>
        </section>

        <section id="pricing" class="py-20 bg-secondary/30">
            <div class="max-w-7xl mx-auto px-6 text-center">
                <h2 class="text-4xl font-bold" data-i18n="pricing.title"></h2>
                <div class="grid md:grid-cols-3 gap-8 mt-12">
                    <div class="p-8 border rounded-3xl bg-background">
                        <h3 class="text-xl font-bold" data-i18n="pricing.basic.title"></h3>
                        <p class="text-4xl font-bold my-6">$2.99</p>
                        <button class="w-full py-3 rounded-xl bg-primary text-white" data-i18n="pricing.basic.btn"></button>
                    </div>
                </div>
            </div>
        </section>

        <section id="team" class="py-20">
            <div class="max-w-7xl mx-auto px-6 text-center">
                <h2 class="text-4xl font-bold mb-16" data-i18n="team.title"></h2>
                <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="p-6 border rounded-2xl bg-card">
                        <div class="w-16 h-16 rounded-full bg-secondary mx-auto mb-4"></div>
                        <h4 class="font-bold">Nombre</h4>
                        <p class="text-sm text-primary" data-i18n="team.role1"></p>
                    </div>
                </div>
            </div>
        </section>

        <section class="py-24 bg-primary text-primary-foreground text-center">
            <div class="max-w-4xl mx-auto px-6">
                <h2 class="text-5xl font-bold mb-6" data-i18n="cta.title"></h2>
                <p class="text-lg opacity-90 mb-10" data-i18n="cta.subtitle"></p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <button class="bg-white text-primary px-8 py-4 rounded-xl font-bold" data-i18n="cta.btn1"></button>
                    <button class="bg-transparent border border-white/20 px-8 py-4 rounded-xl font-bold" data-i18n="cta.btn2"></button>
                </div>
            </div>
        </section>

    </main>

    <footer class="bg-card border-t border-border py-16">
        <div class="max-w-7xl mx-auto px-6 grid grid-cols-2 md:grid-cols-4 gap-12">
            <div>
                <h4 class="font-bold mb-4" data-i18n="footer.product.title"></h4>
                <ul class="space-y-2 text-sm text-muted-foreground">
                    <li><a href="#" data-i18n="footer.product.link1"></a></li>
                    <li><a href="#" data-i18n="footer.product.link2"></a></li>
                </ul>
            </div>
        </div>
        <div class="text-center mt-12 text-sm text-muted-foreground">
            <p data-i18n="footer.copyright"></p>
        </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
